<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>DARK013TATTOO · Catálogo de Joias em Titânio</title>
  
  <!-- Fonte Google -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Estilos externos -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  
  <header class="studio-header">
    <div class="studio-name">DARK013TATTOO</div>
    <div class="badge">⚡ Joias em Titânio ⚡</div>
  </header>

  <!-- Painel de controle Supabase (oculto por padrão) -->
  <div class="supabase-toggle" id="supabasePanel" style="display: none;">
    <span style="display: flex; align-items: center; gap: 6px;">🗄️ Modo Supabase</span>
    <div style="display: flex; gap: 10px;">
      <button class="btn" id="useSupabaseBtn">🔄 Carregar do Supabase</button>
      <button class="btn" id="useStaticBtn">📦 Usar catálogo local</button>
    </div>
    <span id="supabaseStatus" style="font-size:0.8rem; opacity:0.8;">Não configurado</span>
  </div>

  <div class="catalog-title">
    Catálogo de Joias <span></span>
  </div>

  <!-- Container dos cards -->
  <div id="productContainer" class="product-grid">
    <div class="loading">Carregando catálogo...</div>
  </div>

  <div class="footer-note">
    DARK013TATTOO  <br>
    Consulte disponibilidade de medidas · Studio Tattoo & Piercing
  </div>
</div>

<!-- Script principal -->
<script src="script.js" defer></script>
</body>
</html>
